    <meta name="theme-color" content="#5d4037" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>般若伴侣 - 佛教修行助手</title>
    <link rel="manifest" href="./manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Polyfill process.env for Android WebView / Browser environments
      // preventing 'process is not defined' errors when using the SDK.
      window.process = {
        env: {
          NODE_ENV: 'production'
        }
      };

      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'zen-bg': '#f5f5f0',
              'zen-paper': '#fdfbf7',
              'zen-brown': '#5d4037',
              'zen-gold': '#b08d55',
              'zen-gray': '#8d8d8d',
              'zen-dark': '#2c2c2c',
            },
            fontFamily: {
              serif: ['"Noto Serif SC"', 'serif', 'Georgia'],
              sans: ['"Noto Sans SC"', 'sans-serif', 'system-ui'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #f5f5f0;
        color: #2c2c2c;
        /* Native App Feel */
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
